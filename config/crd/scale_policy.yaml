apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scalepolicies.kubehalo.sh
spec:
  group: kubehalo.sh
  names:
    kind: ScalePolicy
    listKind: ScalePolicyList
    plural: scalepolicies
    singular: scalepolicy
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                evaluationIntervalSeconds:
                  type: integer
                targetRef:
                  type: object
                  properties:
                    kind:
                      enum: ["Deployment", "StatefulSet"]
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                  required: ["kind", "name", "namespace"]
                metric:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                    query:
                      type: string
                    threshold:
                      type: number
                    targetType:
                      type: string
                  required: ["name", "query", "threshold"]
                scaleUp:
                  type: object
                  properties:
                    step:
                      type: integer
                    cooldownSeconds:
                      type: integer
                  required: ["step"]
                scaleDown:
                  type: object
                  properties:
                    step:
                      type: integer
                    cooldownSeconds:
                      type: integer
                  required: ["step"]
                minReplicas:
                  type: integer
                maxReplicas:
                  type: integer
                schedules:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      days:
                        type: array
                        items:
                          type: string
                          enum: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
                      startTime:
                        type: string
                      endTime:
                        type: string
                      minReplicas:
                        type: integer
                      maxReplicas:
                        type: integer
                    required: ["days", "startTime", "endTime"]
                behavior:
                  type: object
                  properties:
                    stabilizationWindowSeconds:
                      type: integer
                    maxScaleUpRate:
                      type: integer
                    maxScaleDownRate:
                      type: integer
                    policy:
                      type: string
                      enum: ["absolute", "percent"]
              required: ["targetRef", "metric", "scaleUp", "scaleDown", "minReplicas", "maxReplicas"]
      subresources:
        status: {}
