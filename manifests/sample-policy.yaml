apiVersion: kubehalo.sh/v1
kind: ScalePolicy
metadata:
  name: test-policy
  namespace: default
spec:
  targetRef:
    kind: Deployment
    name: my-deployment
    namespace: default
  metric:
    name: cpu
    query: rate(container_cpu_usage_seconds_total[1m])
    threshold: 0.8
  scaleUp:
    step: 2
    cooldownSeconds: 60
  scaleDown:
    step: 1
    cooldownSeconds: 120
  minReplicas: 1
  maxReplicas: 10
  schedules:
    - name: weekday-business-hours
      days: ["Mon", "Tue", "Wed", "Thu", "Fri"]
      startTime: "09:00"
      endTime: "18:00"
      minReplicas: 3
      maxReplicas: 10
  behavior:
    stabilizationWindowSeconds: 60
    maxScaleUpRate: 2
    maxScaleDownRate: 1
    policy: absolute
